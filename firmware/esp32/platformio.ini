; PlatformIO project for Floating Farm ESP32 firmware.
; Build:  pio run
; Upload: pio run -t upload
; Serial: pio device monitor -b 115200
;
; Motores DC JGB-37 con driver L298N (PWM + dirección). Sin librerías externas.

[env:esp32dev]
platform     = espressif32
board        = esp32dev
framework    = arduino
monitor_speed = 115200
upload_speed  = 921600
build_flags =
    -D CORE_DEBUG_LEVEL=0
